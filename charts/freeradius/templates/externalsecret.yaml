{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "freeradius.fullname" . }}-credentials
  labels:
    {{- include "freeradius.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.externalSecret.secretStoreName }}
  target:
    name: {{ include "freeradius.credentialsSecretName" . }}
    creationPolicy: Owner
  {{- if .Values.externalSecret.dataFrom.enabled }}
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.dataFrom.key | quote }}
  {{- else }}
  data:
    {{- range $envVar, $ref := .Values.externalSecret.remoteRefs }}
    {{- if not $ref.key }}
    {{- fail (printf "externalSecret.remoteRefs.%s.key must be set when externalSecret.dataFrom.enabled is false" $envVar) }}
    {{- end }}
    - secretKey: {{ $envVar }}
      remoteRef:
        key: {{ $ref.key | quote }}
        {{- if $ref.property }}
        property: {{ $ref.property | quote }}
        {{- end }}
    {{- end }}
  {{- end }}
{{- end }}