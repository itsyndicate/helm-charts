# -- Number of replicas to spin up
replicaCount: 1
# -- Old ReplicaSets retained for rollback (set null to fall back to the Kubernetes default of 10)
revisionHistoryLimit: 3

# -- Secret used to store Docker registry credentials
imagePullSecrets: []

# -- Overrides release name
nameOverride: ""

# -- Overrides full release name
fullnameOverride: ""

# -- Service Account configuration
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use
  name: ""

# -- Annotations to add to the pods
podAnnotations: {}

# -- Labels to add to the pods
podLabels: {}

# -- Security context for the pod
podSecurityContext: {}
# fsGroup: 2000
# -- Ingress settings
# @section -- Networking Settings
ingress:
  # -- Enables ingress when true
  enabled: false
  className: ""
  annotations: { }
  # kubernetes.io/ingress.class: nginx
  # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: [ ]
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local
  
# -- FastAPI-specific configurations
# @section -- FastAPI Settings
# @default -- A complex object. Please check values below
fastapi:
  # -- FastAPI image settings
  # @section -- FastAPI Settings
  image:
    # -- FastAPI Docker image repository
    repository: my-fastapi-image
    # -- Tag of the FastAPI image
    # @section -- FastAPI Settings
    tag: latest
    # -- Image pull policy (Always, IfNotPresent, Never)
    pullPolicy: IfNotPresent

  # -- Override the default container command
  # @section -- FastAPI Settings
  command: []
  # -- Override the default container arguments
  # @section -- FastAPI Settings
  args: []
  # -- Port the app binds to (and the container/probe port) when the NginX sidecar is disabled
  # (nginx.enabled=false). Keep it above 1024 so the container can bind without root / NET_BIND_SERVICE.
  # When the NginX sidecar is enabled the app listens on a UNIX socket and this value is unused.
  # @section -- FastAPI Settings
  port: 8000

  # -- Security context for the FastAPI container
  # @section -- FastAPI Settings
  securityContext: {}

  # -- Resource limits and requests for the FastAPI container
  # @section -- FastAPI Settings
  resources: {}
  env:
    # -- Name of an existing Secret to use instead of creating one from variables.
    # If set, the chart will not create its own Secret and will mount this one in the deployment and workers.
    # Useful when secrets are managed externally (e.g. via External Secrets Operator).
    # @section -- FastAPI Settings
    existingSecretName: ""
    # -- Key-value pairs of environment variables (will be base64 encoded in the secret)
    # @section -- FastAPI Settings
    variables: {}
    # -- Use AWS secrets manager ref. Works with external-secrets operator
    # @section -- FastAPI Settings
    envFromSecretsManager:
      # -- Enable fetching secrets from an external secrets manager (e.g., AWS)
      enabled: false
      # -- Path to the secret in the external secrets manager
      secretPath: "path/to/secret"

  # -- Liveness probe for FastAPI. Leave empty to use the chart's mode-aware default: no liveness
  # probe when the NginX sidecar is enabled (app on a UNIX socket), or an HTTP check on /health
  # at the app port when it is disabled. Set a value here to override.
  # @section -- FastAPI Settings
  livenessProbe: {}

  # -- Readiness probe for FastAPI. Leave empty to use the chart's mode-aware default: a UNIX socket
  # check (ls /tmp/uvicorn.sock) when the NginX sidecar is enabled, or an HTTP check on /health at
  # the app port when it is disabled. Set a value here to override.
  # @section -- FastAPI Settings
  readinessProbe: {}

  # -- Additional volume mounts for FastAPI container
  # @section -- FastAPI Settings
  volumeMounts: []

  # -- Additional volumes for FastAPI pods
  # @section -- FastAPI Settings
  volumes: []

  # -- Configuration for FastAPI workers
  # @section -- FastAPI Settings
  workers: []
  #    - name: celery
  #      enabled: true
  #      containerCommand:
  #        - "celery"
  #        - "-A"
  #        - "proj"
  #        - "worker"
  #        - "--loglevel=INFO"
  #      extraVolumes: [ ]
  #      # - name: worker-volume-1
  #      #   secret:
  #      #     secretName: worker-volume-1-conf
  #      extraVolumeMounts: [ ]
  #      #  - name: worker-volume-1
  #      #    mountPath: /opt/worker/conf
  #      #    readOnly: true
  #      resources: { }
  #      # We usually recommend not to specify default resources and to leave this as a conscious
  #      # choice for the user. This also increases chances charts run on environments with little
  #      # resources, such as Minikube. If you do want to specify resources, uncomment the following
  #      # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  #      # limits:
  #      #   cpu: 100m
  #      #   memory: 128Mi
  #      # requests:
  #      #   cpu: 100m
  #      #   memory: 128Mi
  #      replicaCount: 1
  #      autoscaling:
  #        enabled: false
  #        minReplicas: 1
  #        maxReplicas: 100
  #        targetCPUUtilizationPercentage: 80
  #        # targetMemoryUtilizationPercentage: 80
  #      livenessProbe:
  #        httpGet:
  #          path: /
  #          port: http
  #      readinessProbe:
  #        httpGet:
  #          path: /
  #          port: http
  #      nodeSelector: [ ]
  #      # app.kubernetes.io/env: "production"
  #      # app.kubernetes.io/worker: "true"
  #      tolerations: [ ]
  #      affinity: { }

# -- NginX Specific Configurations
# @section -- NginX Settings
# @default -- A complex object. Please check values below
nginx:
  # -- Enable NginX sidecar
  # @section -- NginX Settings
  enabled: true
  # @section -- NginX Settings
  image:
    # -- NginX Docker image repository
    repository: nginx
    # -- Tag of the NginX image
    tag: alpine
    # -- Image pull policy (Always, IfNotPresent, Never)
    pullPolicy: IfNotPresent

  # -- Security context for the NginX container
  # @section -- NginX Settings
  securityContext: {}

  # -- Resource limits and requests for NginX container
  # @section -- NginX Settings
  resources: {}

  # -- Liveness probe configuration for NginX
  # @section -- NginX Settings
  # livenessProbe:
  #   httpGet:
  #     path: /
  #     port: 80
  #   initialDelaySeconds: 10
  #   periodSeconds: 10

  # -- Readiness probe configuration for NginX
  # @section -- NginX Settings
  # readinessProbe:
  #   httpGet:
  #     path: /
  #     port: 80
  #   initialDelaySeconds: 10
  #   periodSeconds: 10

  # -- Additional volume mounts for the NginX container
  # @section -- NginX Settings
  volumeMounts: []

  # -- Additional volumes for the NginX pods
  # @section -- NginX Settings
  volumes: []

  # -- Timeout during which a keep-alive client connection will stay open on the server side
  # @section -- NginX Settings
  keepalive_timeout: 65
  # -- Timeout for reading a response from the proxied server
  # @section -- NginX Settings
  proxy_read_timeout: 60s
  # -- Timeout for transmitting a request to the proxied server
  # @section -- NginX Settings
  proxy_send_timeout: 60s
  # -- Timeout for transmitting a response to the client
  # @section -- NginX Settings
  send_timeout: 60s

# -- Node selector for pod placement
nodeSelector: {}

# -- Affinity rules for pod placement
affinity: {}

# -- Tolerations for pod placement
tolerations: []

# -- Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Pod Disruption Budget settings
# @section -- PDB Settings
pdb:
  create: false
  minAvailable: 1
  # maxUnavailable: 1

# -- Service configuration
# @section -- Networking Settings
service:
  # -- Type of Kubernetes service (ClusterIP, NodePort, LoadBalancer)
  type: ClusterIP
  # -- Port exposed by the service
  port: 80
