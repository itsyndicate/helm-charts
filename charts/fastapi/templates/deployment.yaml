apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fastapi.fullname" . }}
  labels:
    {{- include "fastapi.labels" . | nindent 4 }}
  annotations:
    secret.reloader.stakater.com/reload: "{{ include "fastapi.fullname" . }}-env-secrets{{ with .Values.fastapi.env.existingSecretName }}, {{ . }}{{ end }}, {{ include "fastapi.fullname" . }}-env-ext-secrets"
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- if not (kindIs "invalid" .Values.revisionHistoryLimit) }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "fastapi.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "fastapi.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "fastapi.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        {{- if .Values.nginx.enabled }}
        - name: {{ .Chart.Name }}-nginx
          securityContext:
            {{- toYaml .Values.nginx.securityContext | nindent 12 }}
          image: "{{ .Values.nginx.image.repository }}:{{ .Values.nginx.image.tag | default "alpine" }}"
          imagePullPolicy: {{ .Values.nginx.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.nginx.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.nginx.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.nginx.resources | nindent 12 }}
          volumeMounts:
            - name: socket
              mountPath: /tmp
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          {{- with .Values.nginx.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}

        - name: {{ .Chart.Name }}-fastapi-app
          securityContext:
            {{- toYaml .Values.fastapi.securityContext | nindent 12 }}
          image: "{{ .Values.fastapi.image.repository }}:{{ .Values.fastapi.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.fastapi.image.pullPolicy }}
          {{- if .Values.fastapi.command }}
          command: {{ toJson .Values.fastapi.command }}
          {{- else }}
          command: [ "uvicorn" ]
          {{- end }}
          {{- if .Values.fastapi.args }}
          args: {{ toJson .Values.fastapi.args }}
          {{- else if not .Values.nginx.enabled }}
          args: [ "--host", "0.0.0.0", "--port", "{{ .Values.fastapi.port }}", "--workers", "3", "main:app" ]
          {{- else }}
          args: [ "--uds", "/tmp/uvicorn.sock", "--workers", "3", "main:app" ]
          {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "fastapi.fullname" . }}-env-secrets
            {{- if .Values.fastapi.env.existingSecretName }}
            - secretRef:
                name: {{ .Values.fastapi.env.existingSecretName }}
            {{- end }}
            {{- if .Values.fastapi.env.envFromSecretsManager.enabled }}
            - secretRef:
                name: {{ include "fastapi.fullname" . }}-env-ext-secrets
            {{- end }}
          {{- if not .Values.nginx.enabled }}
          ports:
            - name: http
              containerPort: {{ .Values.fastapi.port }}
              protocol: TCP
          {{- end }}
          {{- if .Values.fastapi.livenessProbe }}
          livenessProbe:
            {{- toYaml .Values.fastapi.livenessProbe | nindent 12 }}
          {{- else if not .Values.nginx.enabled }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- end }}
          readinessProbe:
            {{- if .Values.fastapi.readinessProbe }}
            {{- toYaml .Values.fastapi.readinessProbe | nindent 12 }}
            {{- else if .Values.nginx.enabled }}
            exec:
              command:
                - ls
                - /tmp/uvicorn.sock
            initialDelaySeconds: 5
            periodSeconds: 5
            {{- else }}
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            {{- end }}
          resources:
            {{- toYaml .Values.fastapi.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.nginx.enabled }}
            - name: socket
              mountPath: /tmp
            {{- end }}
          {{- with .Values.fastapi.volumeMounts }}
            {{- toYaml . | nindent 12 }}
          {{- end }}

      volumes:
        {{- if .Values.nginx.enabled }}
        - name: socket
          emptyDir: { }
        {{- end }}
        {{- if .Values.nginx.enabled }}
        - name: nginx-conf
          configMap:
            name: {{ include "fastapi.fullname" $ }}-nginx-conf
            items:
              - key: nginx.conf
                path: nginx.conf
        {{- with .Values.nginx.volumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- end }}
      {{- with .Values.fastapi.volumes }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
