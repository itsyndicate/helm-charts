{{- if .Values.nextjs.preDeployJob.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "nextjs.fullname" . }}-pre-deploy
  labels:
    app.kubernetes.io/component: pre-deploy-job
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.nextjs.preDeployJob.backoffLimit }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "nextjs.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.nextjs.securityContext | nindent 12 }}
          image: "{{ .Values.nextjs.image.repository }}:{{ .Values.nextjs.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.nextjs.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "nextjs.fullname" . }}-env-pre-deploy-secrets
            {{- if .Values.nextjs.env.existingSecretName }}
            - secretRef:
                name: {{ .Values.nextjs.env.existingSecretName }}
            {{- end }}
            {{- if .Values.nextjs.env.envFromSecretsManager.enabled }}
            - secretRef:
                name: {{ include "nextjs.fullname" . }}-env-ext-secrets
            {{- end }}
          {{- with .Values.nextjs.preDeployJob.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.nextjs.preDeployJob.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.nextjs.resources | nindent 12 }}
          {{- with .Values.nextjs.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nextjs.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
{{- end -}}