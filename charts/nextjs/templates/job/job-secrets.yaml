{{- if .Values.nextjs.preDeployJob.enabled -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "nextjs.fullname" . }}-env-pre-deploy-secrets
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded
type: Opaque
data:
  {{- range $key, $val := .Values.nextjs.env.variables }}
  {{ $key }}: {{ $val | b64enc }}
  {{- end}}

{{- if .Values.nextjs.env.envFromSecretsManager.enabled }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "nextjs.fullname" . }}-env-pre-deploy-ext-secrets
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: global-secret-store
    kind: ClusterSecretStore
  target:
    name: {{ include "nextjs.fullname" . }}-env-pre-deploy-ext-secrets
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.nextjs.env.envFromSecretsManager.secretPath }}
{{- end }}
{{- end }}