# -- Number of replicas to sping up
replicaCount: 1
# -- Old ReplicaSets retained for rollback (set null to fall back to the Kubernetes default of 10)
revisionHistoryLimit: 3
# -- Secret that used to store docker registry credentials
imagePullSecrets: [ ]
# -- Overrides release name
nameOverride: ""
# -- Overrides full release name
fullnameOverride: ""
# -- Service Account
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: true
  # -- Annotations to add to the service account
  annotations: { }
  # -- The name of the service account to use.
  name: ""
# -- Annotations to add to the pod
podAnnotations: { }
# -- Labels to add to the pod
podLabels: { }
# -- Security context of the pod
podSecurityContext: { }
# fsGroup: 2000

# -- NginX Specific Configurations
# @section -- NginX Settings
# @default -- A complex object. Please check values below
nginx:
  # -- Enable NginX sidecar
  # @section -- NginX Settings
  enabled: true
  # -- NginX image settings
  # @section -- NginX Settings
  image:
    repository: nginx
    pullPolicy: IfNotPresent
    # -- Overrides the image tag whose default is the chart appVersion
    # @section -- NginX Settings
    tag: ""
  # -- NginX container security context
  # @section -- NginX Settings
  securityContext: { }
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000
  # -- NginX container resources
  # @section -- NginX Settings
  resources: { }
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # -- NginX container liveness probe
  # @section -- NginX Settings
  #  livenessProbe:
  #    httpGet:
  #      path: /
  #      port: http
  # -- NginX container readiness probe
  # @section -- NginX Settings
  #  readinessProbe:
  #    httpGet:
  #      path: /
  #      port: http
  # -- NginX container additional volumes
  # @section -- NginX Settings
  volumes: [ ]
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # -- NginX container additional volumes mounts
  # @section -- NginX Settings
  volumeMounts: [ ]
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  # -- Timeout during which a keep-alive client connection will stay open on the server side
  # @section -- NginX Settings
  keepalive_timeout: 65
  # -- Timeout for reading a response from the proxied server
  # @section -- NginX Settings
  proxy_read_timeout: 60s
  # -- Timeout for transmitting a request to the proxied server
  # @section -- NginX Settings
  proxy_send_timeout: 60s
  # -- Timeout for transmitting a response to the client
  # @section -- NginX Settings
  send_timeout: 60s

# -- Django Specific Configurations
# @section -- Django Settings
# @default -- A complex object. Please check values below
django:
  # -- Django image settings
  # @section -- Django Settings
  image:
    repository: django
    pullPolicy: IfNotPresent
    # -- Overrides the image tag whose default is the chart appVersion
    # @section -- Django Settings
    tag: ""

  # -- Override the default container command
  # @section -- Django Settings
  command: []
  # -- Override the default container arguments
  # @section -- Django Settings
  args: []
  # -- Port the app binds to (and the container/probe port) when the NginX sidecar is disabled
  # (nginx.enabled=false). Keep it above 1024 so the container can bind without root / NET_BIND_SERVICE.
  # When the NginX sidecar is enabled the app listens on a UNIX socket and this value is unused.
  # @section -- Django Settings
  port: 8000

  # -- Django container security context
  # @section -- Django Settings
  securityContext: { }
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000
  # -- Django container resources
  # @section -- Django Settings
  resources: { }
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
  # -- Django container liveness probe
  # @section -- Django Settings
  #  livenessProbe:
  #    httpGet:
  #      path: /
  #      port: http
  # -- Django container readiness probe. Leave empty to use the chart's mode-aware default:
  # a UNIX socket check (ls /tmp/uvicorn.sock) when the NginX sidecar is enabled, or a TCP
  # check on the app port when it is disabled. Set a value here to override the default.
  # @section -- Django Settings
  readinessProbe: {}
  #  httpGet:
  #    path: /
  #    port: http
  # -- Django container additional volumes
  # @section -- Django Settings
  volumes: [ ]
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # -- Django container additional volumes mounts
  # @section -- Django Settings
  volumeMounts: [ ]
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true
  # -- Django environment variables
  # @section -- Django Settings
  env:
    # -- Name of an existing Secret to use instead of creating one from variables.
    # If set, the chart will not create its own Secret and will mount this one in the deployment, workers, cronjobs, and migration job.
    # Useful when secrets are managed externally (e.g. via External Secrets Operator).
    # @section -- Django Settings
    existingSecretName: ""
    # -- Use AWS secrets manager ref. Works with external-secrets operator
    # @section -- Django Settings
    envFromSecretsManager:
      enabled: false
      secretPath: dev/example-com/env-secrets
    # -- Extra env variables
    # @section -- Django Settings
    variables:
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      DEBUG: "True"
  # -- Enables migration job before rolling the update
  # @section -- Django Settings
  migrationJob:
    enabled: false
  # -- Enables cron jobs
  # @section -- Django Settings
  # @default -- [ ]
  cronJobs: [ ]
  #    - name: my_awesome_django_cron
  #      enabled: true
  #      cronSchedule: "*/5 * * * *"
  #      containerCommand:
  #        - "python"
  #        - "manage.py"
