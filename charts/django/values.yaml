  #      #   - ALL
  #      # readOnlyRootFilesystem: true
  #      # runAsNonRoot: true
  #      # runAsUser: 1000
  #      resources: { }
  #      nodeSelector: [ ]
  #      tolerations: [ ]
  #      affinity: { }
  # -- Enables Django Workers
  # @section -- Django Settings
  # @default -- [ ]
  workers: []
